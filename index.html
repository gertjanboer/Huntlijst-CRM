<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huntlijst CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface-0:#f0f0ed;--surface-1:#f7f7f5;--surface-2:#ebebea;
  --text-primary:#1a1a18;--text-secondary:#5a5a55;--text-muted:#8a8a85;
  --border:#d8d8d4;--border-strong:#b8b8b4;--border-accent:#3a7fd4;
  --bg-accent:#ddeeff;--text-accent:#1255a0;--fill-accent:#185fa5;--on-accent:#fff;
  --bg-warning:#fff3d4;--border-warning:#c47a0a;--text-warning:#8a5000;
  --bg-danger:#ffeeee;--border-danger:#cc4444;--text-danger:#a02020;
  --text-success:#1a7a40;
  --radius:6px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'SF Mono','Fira Mono','Consolas',monospace;
}
body{font-family:var(--font-sans);font-size:13px;color:var(--text-primary);background:var(--surface-0);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface-1);border-bottom:0.5px solid var(--border);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-right:8px;letter-spacing:-.3px}
.prod-tabs{display:flex;gap:4px}
.prod-tab{padding:4px 12px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s;font-family:var(--font-sans)}
.prod-tab.active{background:var(--bg-accent);border-color:var(--border-accent);color:var(--text-accent);font-weight:500}
.prod-tab.active-ia{background:#ddeeff;border-color:#1a6bbf;color:#0a3d7a;font-weight:500}
.prod-tab.active-px{background:#d4f5e9;border-color:#0a7a50;color:#054d32;font-weight:500}
.prod-tab.active-all{background:#ebebea;border-color:#888;color:#333;font-weight:500}
.prod-tab:hover:not(.active){background:var(--surface-2)}
.export-btn{margin-left:auto;padding:5px 14px;border-radius:var(--radius);border:0.5px solid var(--border-accent);background:var(--bg-accent);color:var(--text-accent);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font-sans)}
.export-btn:hover{background:var(--fill-accent);color:var(--on-accent)}
.nav-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface-1);flex-shrink:0}
.nav-tab{padding:8px 18px;cursor:pointer;font-size:13px;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.nav-tab.active{color:var(--text-accent);border-bottom-color:var(--fill-accent);font-weight:500}
.nav-tab:hover:not(.active){color:var(--text-primary)}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--surface-1);flex-shrink:0;flex-wrap:wrap}
.filter-select{padding:4px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);font-size:12px;cursor:pointer;font-family:var(--font-sans)}
.search-input{padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);font-size:12px;width:180px;font-family:var(--font-sans)}
.search-input:focus{outline:none;border-color:var(--border-accent)}
.count-badge{margin-left:auto;font-size:11px;color:var(--text-muted)}
.add-btn{padding:4px 12px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);cursor:pointer;font-size:12px;font-family:var(--font-sans)}
.add-btn:hover{background:var(--surface-0);border-color:var(--border-strong)}
.table-wrap{overflow:auto;flex:1}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--text-muted);border-bottom:0.5px solid var(--border);background:var(--surface-1);position:sticky;top:0;z-index:1;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text-secondary)}
td{padding:7px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;color:var(--text-primary)}
tr.overdue td{background:rgba(162,45,45,.12)}
tr.warn td{background:rgba(133,79,11,.1)}
tr:hover td{background:var(--surface-1);cursor:pointer}
.prio-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:600}
.p1{background:#fde8e8;color:#a32020}
.p2{background:#fef0dc;color:#8a4a00}
.p3{background:#fafae0;color:#6a5800}
.p4{background:#ebebea;color:#8a8a85;border:0.5px solid #d8d8d4}
.date-mono{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary)}
.date-overdue{color:var(--text-danger)!important;font-weight:600}
.date-warn{color:var(--text-warning)!important;font-weight:600}
.type-chip{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;background:var(--surface-2);border:0.5px solid var(--border);color:var(--text-secondary)}
.prod-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:2px}
.pd-ia{background:#1a6bbf;width:9px;height:9px}.pd-px{background:#0a9060;width:9px;height:9px}

.detail-panel{padding:20px;max-width:760px;margin:0 auto}
.detail-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
.detail-avatar{width:48px;height:48px;border-radius:50%;background:var(--bg-accent);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:var(--text-accent);flex-shrink:0}
.detail-name{font-size:18px;font-weight:600;margin-bottom:2px}
.detail-sub{font-size:13px;color:var(--text-secondary)}
.back-btn{padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-size:12px;margin-bottom:16px;font-family:var(--font-sans)}
.back-btn:hover{background:var(--surface-0)}
.agenda-box{background:var(--bg-warning);border:0.5px solid var(--border-warning);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px}
.agenda-label{font-size:11px;font-weight:500;color:var(--text-warning);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.field-group{display:flex;flex-direction:column;gap:3px}
.field-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:500}
.field-value{font-size:13px;color:var(--text-primary);padding:5px 8px;border-radius:var(--radius);border:0.5px solid transparent;background:transparent;cursor:text;min-height:28px;transition:all .12s}
.field-value:hover{border-color:var(--border);background:var(--surface-2)}
.field-value:focus{outline:none;border-color:var(--border-accent);background:var(--surface-2)}
.field-input{font-size:13px;color:var(--text-primary);padding:5px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);width:100%;font-family:var(--font-sans)}
.field-input:focus{outline:none;border-color:var(--border-accent)}
.field-select{font-size:13px;color:var(--text-primary);padding:4px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);font-family:var(--font-sans);width:100%}
.field-select:focus{outline:none;border-color:var(--border-accent)}
.section-title{font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
.log-entry{padding:10px 0;border-bottom:0.5px solid var(--border)}
.log-date{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:3px}
.log-text{font-size:13px;color:var(--text-primary);line-height:1.5}
.add-log-btn{padding:6px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);cursor:pointer;font-size:12px;margin-top:12px;font-family:var(--font-sans)}
.add-log-btn:hover{border-color:var(--border-strong);background:var(--surface-0)}
.log-form{margin-top:10px;display:flex;flex-direction:column;gap:8px;background:var(--surface-1);padding:12px;border-radius:var(--radius);border:0.5px solid var(--border)}
.log-textarea{padding:8px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);font-size:13px;font-family:var(--font-sans);resize:vertical;min-height:80px;width:100%}
.log-textarea:focus{outline:none;border-color:var(--border-accent)}
.save-log-btn{padding:5px 14px;border-radius:var(--radius);border:0.5px solid var(--border-accent);background:var(--bg-accent);color:var(--text-accent);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font-sans)}
.save-log-btn:hover{background:var(--fill-accent);color:var(--on-accent)}
.prod-checkboxes{display:flex;gap:12px;flex-wrap:wrap}
.prod-check{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;color:var(--text-secondary)}
.new-contact-form{background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);margin:12px 16px;padding:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.form-row{display:flex;flex-direction:column;gap:3px}
.form-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:500}
.form-input{padding:5px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-primary);font-size:13px;font-family:var(--font-sans)}
.form-input:focus{outline:none;border-color:var(--border-accent)}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn-primary{padding:5px 14px;border-radius:var(--radius);border:0.5px solid var(--border-accent);background:var(--bg-accent);color:var(--text-accent);cursor:pointer;font-size:12px;font-weight:500;font-family:var(--font-sans)}
.btn-primary:hover{background:var(--fill-accent);color:var(--on-accent)}
.btn-cancel{padding:5px 14px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface-2);color:var(--text-secondary);cursor:pointer;font-size:12px;font-family:var(--font-sans)}
.btn-cancel:hover{background:var(--surface-0)}
.empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:13px}
.del-btn{padding:3px 8px;border-radius:var(--radius);border:0.5px solid var(--border-danger);background:var(--bg-danger);color:var(--text-danger);cursor:pointer;font-size:11px;margin-left:auto;font-family:var(--font-sans)}
.del-btn:hover{background:#5a1a1a}
.companies-list{padding:16px}
.company-card{background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.company-name{font-size:14px;font-weight:500;margin-bottom:4px}
.company-contacts{font-size:12px;color:var(--text-secondary);margin-bottom:6px;line-height:1.5}
.content-scroll{flex:1;overflow:auto}

.login-screen{position:fixed;inset:0;background:#f0f0ed;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#f7f7f5;border:0.5px solid #d8d8d4;border-radius:10px;padding:36px 40px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-title{font-size:18px;font-weight:600;color:#1a1a18;margin-bottom:4px}
.login-sub{font-size:12px;color:#8a8a85;margin-bottom:24px}
.login-label{font-size:11px;color:#8a8a85;text-transform:uppercase;letter-spacing:.4px;font-weight:500;margin-bottom:4px}
.login-input{width:100%;padding:8px 10px;border-radius:6px;border:0.5px solid #d8d8d4;background:#ebebea;color:#1a1a18;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin-bottom:16px}
.login-input:focus{outline:none;border-color:#3a7fd4}
.login-btn{width:100%;padding:9px;border-radius:6px;border:none;background:#1a6bbf;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.login-btn:hover{background:#1255a0}
.login-error{font-size:12px;color:#a02020;margin-top:8px;min-height:18px}
.login-hint{font-size:11px;color:#8a8a85;margin-top:12px;cursor:pointer;text-decoration:underline;text-align:center}
.login-hint-text{font-size:12px;color:#8a8a85;margin-top:8px;text-align:center;display:none}

.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#f7f7f5;border:0.5px solid #d8d8d4;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;max-height:180px;overflow-y:auto;margin-top:2px}
.autocomplete-item{padding:7px 10px;font-size:13px;cursor:pointer;color:#1a1a18;border-bottom:0.5px solid #ebebea}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item.selected{background:#ddeeff;color:#0a3d7a}
.autocomplete-item.new-item{color:#1a6bbf;font-style:italic}
</style>
</head>

function addId(c,i){return{...c,id:c.id||(Date.now()+i+Math.random()*1000|0)}}
function getToday(){return new Date().toISOString().slice(0,10)}
function isOverdue(d){const t=getToday();return d&&d<t}
function isWarn(d){if(!d)return false;const t=getToday();if(d<t)return false;const diff=(new Date(d)-new Date(t))/(86400000);return diff<=2}
function fmt(d){return d||'—'}
function fullName(c){const p=[c.voornaam];if(c.tv)p.push(c.tv);p.push(c.achternaam);return p.join(' ')}
function initials(c){return((c.voornaam||'?')[0]+(c.achternaam||'?')[0]).toUpperCase()}

let state={contacts:[],companies:[],bedrijfTypes:[...BEDRIJF_TYPES],sectoren:[...SECTOREN],tab:'contacten',companyDetail:null,companySearch:'',companyFilterType:'',companyFilterSector:'',showLijstbeheer:false,showNewCompany:false,newCompanyName:'',newCompany:{name:'',types:[],sectoren:[],notities:'',status:'prospect',contactIds:[]},activeProd:'Interim & Advies',filterType:'',filterPrio:'',search:'',sortCol:'prio',sortDir:1,detail:null,showNewForm:false,showLogForm:false,newContact:{voornaam:'',achternaam:'',tv:'',rol:'',bedrijf:'',type:'Directeur',prio:2,lastContact:'',nextContact:'',agendaNotitie:'',feitjes:'',producten:['Interim & Advies'],log:[]}};

function load(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){state.contacts=JSON.parse(s).map(addId);}
    else{state.contacts=START_DATA.map(addId);save();}
  }catch(e){state.contacts=START_DATA.map(addId);save();}
  try{
    const s2=localStorage.getItem(COMPANIES_KEY);
    if(s2)state.companies=JSON.parse(s2);
    else{state.companies=buildCompanies();saveCompanies();}
  }catch(e){state.companies=buildCompanies();saveCompanies();}
  try{
    const s3=localStorage.getItem(LISTS_KEY);
    if(s3){const l=JSON.parse(s3);state.bedrijfTypes=l.bedrijfTypes||[...BEDRIJF_TYPES];state.sectoren=l.sectoren||[...SECTOREN];}
  }catch(e){}
  render();
}

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state.contacts));}catch(e){}}
function saveCompanies(){try{localStorage.setItem(COMPANIES_KEY,JSON.stringify(state.companies));}catch(e){}}
function saveLists(){try{localStorage.setItem(LISTS_KEY,JSON.stringify({bedrijfTypes:state.bedrijfTypes,sectoren:state.sectoren}));}catch(e){}}
function buildCompanies(){return[...new Set(state.contacts.map(c=>c.bedrijf).filter(Boolean))].map(n=>({name:n,types:[],sectoren:[],notities:''}));}
function bedrijfStatus(name){
  const contacts=state.contacts.filter(c=>c.bedrijf===name&&c.lastContact);
  if(!contacts.length)return'prospect';
  const latest=contacts.map(c=>c.lastContact).sort().reverse()[0];
  const monthsAgo=(new Date(getToday())-new Date(latest))/(1000*60*60*24*30);
  return monthsAgo<=12?'actief':'prospect';
}
function ensureCompany(name){if(!name)return;if(!state.companies.find(c=>c.name===name)){state.companies.push({name,types:[],sectoren:[],notities:''});saveCompanies();}}

function sortedFiltered(){
  let list=state.contacts.filter(c=>{
    if(state.activeProd!=='Alle')if(!c.producten||!c.producten.includes(state.activeProd))return false;
    if(state.filterType&&c.type!==state.filterType)return false;
    if(state.filterPrio&&c.prio!==parseInt(state.filterPrio))return false;
    if(state.search){const q=state.search.toLowerCase();if(!fullName(c).toLowerCase().includes(q)&&!(c.bedrijf||'').toLowerCase().includes(q)&&!(c.rol||'').toLowerCase().includes(q))return false;}
    return true;
  });
  list.sort((a,b)=>{
    const ao=isOverdue(a.nextContact)?0:1,bo=isOverdue(b.nextContact)?0:1;
    if(ao!==bo)return ao-bo;
    if(state.sortCol==='prio'){const d=a.prio-b.prio;if(d)return d*state.sortDir;}
    if(state.sortCol==='naam')return fullName(a).localeCompare(fullName(b))*state.sortDir;
    if(state.sortCol==='nextContact')return((a.nextContact||'9')>(b.nextContact||'9')?1:-1)*state.sortDir;
    if(state.sortCol==='lastContact')return((a.lastContact||'9')>(b.lastContact||'9')?1:-1)*state.sortDir;
    return a.prio-b.prio;
  });
  return list;
}

function prioBadge(p){const cls=['','p1','p2','p3','p4'];return`<span class="prio-badge ${cls[p]}">${p}</span>`}
function typeChip(t){return`<span class="type-chip">${t}</span>`}
function prodDots(ps){return(ps||[]).map(p=>p==='Projaxis'?'<span class="prod-dot pd-px" title="Projaxis"></span>':'<span class="prod-dot pd-ia" title="Interim & Advies"></span>').join('')}

        <select class="filter-select" onchange="setFilter('prio',this.value)">
          <option value="">Alle prio</option>
          ${PRIOS.map(p=>`<option value="${p}"${state.filterPrio==p?' selected':''}>${p}</option>`).join('')}
        </select>
        <input class="search-input" placeholder="Zoeken op naam, bedrijf, rol..." value="${state.search.replace(/"/g,'&quot;')}" oninput="setSearch(this.value)">

        <thead><tr>
          <th onclick="setSort('naam')">Naam ${si('naam')}</th>
          <th>Bedrijf</th><th>Rol</th><th>Type</th>
          <th onclick="setSort('prio')">Prio ${si('prio')}</th>
          <th onclick="setSort('lastContact')">Laatste contact ${si('lastContact')}</th>
          <th onclick="setSort('nextContact')">Volgende contact ${si('nextContact')}</th>
          <th>Product</th>
        </tr></thead><tbody>
        ${list.length===0?'<tr><td colspan="8" class="empty-state">Geen contacten gevonden</td></tr>':''}
        ${list.map(c=>{
          const ov=c.prio<=2&&isOverdue(c.nextContact),wn=c.prio<=2&&isWarn(c.nextContact);
          const rc=ov?'overdue':wn?'warn':'';
          const dc=ov?'date-overdue':wn?'date-warn':'';
          return`<tr class="${rc}" onclick="openDetail(${c.id})">
            <td><strong>${fullName(c)}</strong>${c.agendaNotitie?`<div style="font-size:11px;color:var(--text-warning);margin-top:2px;font-style:italic;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${c.agendaNotitie.replace(/"/g,'&quot;')}">📅 ${c.agendaNotitie}</div>`:''}</td>

            <td style="color:var(--text-secondary)">${c.rol||'—'}</td>
            <td>${typeChip(c.type)}</td>

            <td>${prodDots(c.producten)}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div></div>`;
    }
  } else {
    html+=renderCompanies();
  }
  html+='</div>';
  root.innerHTML=html;
  if(wasSearchFocused){
    const newInput=root.querySelector('.search-input');
    if(newInput){
      newInput.focus();
      newInput.setSelectionRange(selStart,selEnd);
    }
  }
}

function renderCompanies(){
  if(state.companyDetail!==null){return renderCompanyDetail();}
  const byBedrijf={};
  state.contacts.forEach(c=>{if(c.bedrijf)(byBedrijf[c.bedrijf]=byBedrijf[c.bedrijf]||[]).push(c);});
  const names=[...new Set([...state.companies.map(c=>c.name),...Object.keys(byBedrijf)])].sort();

  const fSearch=(state.companySearch||'').toLowerCase();
  const fType=state.companyFilterType||'';
  const fSector=state.companyFilterSector||'';
  const filtered=names.filter(name=>{
    const comp=state.companies.find(c=>c.name===name)||{};
    const contacts=byBedrijf[name]||[];
    if(fSearch){
      const nameMatch=name.toLowerCase().includes(fSearch);
      const contactMatch=contacts.some(c=>fullName(c).toLowerCase().includes(fSearch));
      if(!nameMatch&&!contactMatch)return false;
    }
    if(fType&&!(comp.types||[]).includes(fType))return false;
    if(fSector&&!(comp.sectoren||[]).includes(fSector))return false;
    return true;
  });

  const lijstOpen=state.showLijstbeheer;

  return`<div class="content-scroll">
    <div class="toolbar" style="flex-wrap:wrap;gap:8px">
      <input class="search-input" style="width:200px" placeholder="Zoek naam of contactpersoon..." value="${(state.companySearch||'').replace(/"/g,'&quot;')}" oninput="setCompanySearch(this.value)">
      <select class="filter-select" onchange="setCompanyFilter('type',this.value)">
        <option value="">Alle types</option>
        ${state.bedrijfTypes.map(t=>`<option value="${t}"${state.companyFilterType===t?' selected':''}>${t}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="setCompanyFilter('sector',this.value)">
        <option value="">Alle sectoren</option>
        ${state.sectoren.map(s=>`<option value="${s}"${state.companyFilterSector===s?' selected':''}>${s}</option>`).join('')}
      </select>
      <span class="count-badge">${filtered.length} bedrijven</span>
      <button class="add-btn" onclick="toggleLijstbeheer()">⚙ Lijstbeheer</button>
      <button class="add-btn" onclick="toggleNewCompany()">+ Nieuw bedrijf</button>
    </div>

    ${lijstOpen?renderLijstbeheer():''}
    ${state.showNewCompany?renderNewCompanyForm():''}

    <div class="table-wrap"><table>
      <thead><tr>
        <th>Bedrijf</th>
        <th>Type</th>
        <th>Sector</th>
        <th>Status</th>
        <th>Contactpersonen</th>
      </tr></thead>
      <tbody>
      ${filtered.length===0?'<tr><td colspan="5" class="empty-state">Geen bedrijven gevonden</td></tr>':''}
      ${filtered.map(name=>{
        const comp=state.companies.find(c=>c.name===name)||{name,types:[],sectoren:[],notities:''};
        const contacts=byBedrijf[name]||[];
        const status=bedrijfStatus(name);
        const statusStyle=status==='actief'?'background:#e0f5ec;color:#1a7a40;border:0.5px solid #4caf7d':'background:var(--surface-2);color:var(--text-muted);border:0.5px solid var(--border)';
        return`<tr onclick="openCompanyDetail('${name.replace(/'/g,"\'")}')" style="cursor:pointer">
          <td><strong>${name}</strong>${comp.notities?`<div style="font-size:11px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">${comp.notities}</div>`:''}
          </td>
          <td><span style="font-size:11px;color:var(--text-secondary)">${(comp.types||[]).join(', ')||'—'}</span></td>
          <td><span style="font-size:11px;color:var(--text-secondary)">${(comp.sectoren||[]).join(', ')||'—'}</span></td>
          <td><span style="font-size:11px;padding:1px 8px;border-radius:10px;${statusStyle}">${status}</span></td>
          <td style="font-size:12px;color:var(--text-secondary)">${contacts.length?contacts.map(c=>fullName(c)).join(', '):'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

window.setProd=p=>{state.activeProd=p;state.detail=null;render();}
window.setTab=t=>{state.tab=t;state.detail=null;state.companyDetail=null;render();}
window.setFilter=(k,v)=>{if(k==='type')state.filterType=v;else state.filterPrio=v;render();}
window.setSearch=v=>{state.search=v;render();}
window.setSort=col=>{if(state.sortCol===col)state.sortDir*=-1;else{state.sortCol=col;state.sortDir=1;}render();}
window.openDetail=id=>{state.detail=id;state.showLogForm=false;render();}
window.closeDetail=()=>{state.detail=null;render();}
window.toggleNewForm=()=>{state.showNewForm=!state.showNewForm;render();}
window.toggleLogForm=()=>{state.showLogForm=!state.showLogForm;render();}
window.updateNew=(k,v)=>{state.newContact[k]=v;}
window.toggleNewProd=(p,checked)=>{if(checked){if(!state.newContact.producten.includes(p))state.newContact.producten.push(p);}else{state.newContact.producten=state.newContact.producten.filter(x=>x!==p);}}
window.saveNew=()=>{
  if(!state.newContact.achternaam.trim()){alert('Vul minimaal een achternaam in.');return;}
  const c={...state.newContact,id:Date.now(),log:[]};
  state.contacts.push(c);ensureCompany(c.bedrijf);
  state.showNewForm=false;
  state.newContact={voornaam:'',achternaam:'',tv:'',rol:'',bedrijf:'',type:'Directeur',prio:2,lastContact:'',nextContact:'',agendaNotitie:'',feitjes:'',producten:['Interim & Advies'],log:[]};
  save();render();
}
window.updateField=(id,k,v)=>{
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  if(k==='bedrijf'&&v==='__new__'){const n=prompt('Naam nieuw bedrijf:');if(n){c.bedrijf=n;ensureCompany(n);}else{c.bedrijf='';}}
  else{c[k]=typeof v==='number'?v:v.trim();}
  if(k==='bedrijf')ensureCompany(c.bedrijf);
  save();render();
}
window.toggleProd=(id,p,checked)=>{
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  c.producten=c.producten||[];
  if(checked){if(!c.producten.includes(p))c.producten.push(p);}else{c.producten=c.producten.filter(x=>x!==p);}
  save();
}
window.addLog=(id)=>{
  const c=state.contacts.find(x=>x.id===id);
  const d=document.getElementById('logDate')?.value||getToday();
  const t=document.getElementById('logText')?.value||'';
  if(!t.trim())return;
  c.log=[...(c.log||[]),{date:d,text:t.trim()}].sort((a,b)=>(b.date||"")>(a.date||"")?1:(b.date||"")<(a.date||"")?-1:0);
  if(d>=(c.lastContact||''))c.lastContact=d;
  state.showLogForm=false;save();render();
}
window.updateLog=(id,i,field,val)=>{
  const c=state.contacts.find(x=>x.id===id);if(!c||!c.log[i])return;
  c.log[i][field]=val;
  if(field==='date')c.log.sort((a,b)=>(b.date||'')>(a.date||'')?1:(b.date||'')<(a.date||'')?-1:0);
  save();if(field==='date')render();
}
window.deleteLog=(id,i)=>{
  const c=state.contacts.find(x=>x.id===id);if(!c)return;
  if(!confirm('Contactmoment verwijderen?'))return;
  c.log.splice(i,1);save();render();
}
window.deleteContact=(id)=>{
  if(!confirm('Dit contact permanent verwijderen?'))return;
  state.contacts=state.contacts.filter(c=>c.id!==id);
  state.detail=null;save();render();
}
window.updateComp=(cid,k,v,byCid)=>{
  let comp;
  if(byCid){comp=state.companies.find(c=>(c.name||'').replace(/[^a-zA-Z0-9]/g,'_')===cid);}
  else{comp=state.companies.find(c=>c.name===cid);}
  if(!comp){comp={name:cid,type:'',sector:'',notities:''};state.companies.push(comp);}
  comp[k]=v;saveCompanies();render();
}
window.addListItem=(list,inputId)=>{
  const el=document.getElementById(inputId);
  const val=(el?.value||'').trim();
  if(!val)return;
  if(!state[list].includes(val))state[list].push(val);
  saveLists();el.value='';render();
}
window.removeListItem=(list,i)=>{
  if(!confirm('Verwijder dit item?'))return;
  state[list].splice(i,1);saveLists();render();
}
window.exportXlsx=()=>{
  const today=getToday();
  const byBedrijf={};
  state.contacts.forEach(c=>{if(c.bedrijf)(byBedrijf[c.bedrijf]=byBedrijf[c.bedrijf]||[]).push(c);});

  const contactRows=state.contacts.map(c=>({
    Naam:fullName(c),
    Bedrijf:c.bedrijf||'',
    Rol:c.rol||'',
    Type:c.type||'',
    Prioriteit:c.prio,
    'Interim & Advies':(c.producten||[]).includes('Interim & Advies')?'Ja':'',
    'Projaxis':(c.producten||[]).includes('Projaxis')?'Ja':'',
    'Laatste contact':c.lastContact||'',
    'Volgende contact':c.prio<=2?(c.nextContact||''):'n.v.t.',
    'Agenda-notitie':c.agendaNotitie||'',
    'Persoonlijke feitjes':c.feitjes||'',
    Contactlog:(c.log||[]).map(l=>`[${l.date||'—'}] ${l.text}`).join('\n')
  }));

  const bedrijfRows=[...new Set([...state.companies.map(c=>c.name),...Object.keys(byBedrijf)])].sort().map(name=>{
    const comp=state.companies.find(c=>c.name===name)||{name,type:'',sector:'',notities:''};
    const contacts=byBedrijf[name]||[];
    const status=bedrijfStatus(name);
    return{
      Bedrijf:name,
      Type:comp.type||'',
      Sector:comp.sector||'',
      Status:status.charAt(0).toUpperCase()+status.slice(1),
      Notities:comp.notities||'',
      'Aantal contacten':contacts.length,
      'Contactpersonen':contacts.map(c=>fullName(c)).join(', ')
    };
  });

  const wsC=XLSX.utils.json_to_sheet(contactRows);
  const wsB=XLSX.utils.json_to_sheet(bedrijfRows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,wsC,'Contacten');
  XLSX.utils.book_append_sheet(wb,wsB,'Bedrijven');
  XLSX.writeFile(wb,`CRM_export_${today}.xlsx`);
}

window.saveNewCompany=()=>{
  const n=(state.newCompany.name||'').trim();
  if(!n){document.getElementById('new-company-name')?.focus();return;}
  if(state.companies.find(c=>c.name===n)){
    const el=document.getElementById('new-company-name');
    if(el)el.style.borderColor='var(--border-danger)';
    return;
  }
  const nc=state.newCompany;
  state.companies.push({name:n,types:nc.types,sectoren:nc.sectoren,notities:nc.notities,status:nc.status});
  // Link selected contacts to this company
  nc.contactIds.forEach(id=>{
    const c=state.contacts.find(x=>x.id===id);
    if(c)c.bedrijf=n;
  });
  saveCompanies();
  save();
  state.showNewCompany=false;
  state.newCompany={name:'',types:[],sectoren:[],notities:'',status:'prospect',contactIds:[]};
  state.companyDetail=n;
  render();
}
window.closeCompanyDetail=()=>{state.companyDetail=null;render();}
window.setCompanySearch=v=>{state.companySearch=v;render();}
window.setCompanyFilter=(k,v)=>{if(k==='type')state.companyFilterType=v;else state.companyFilterSector=v;render();}



window.renameCompany=(newName)=>{
  const old=state.companyDetail;
  const n=(newName||'').trim();
  if(!n||n===old)return;
  if(state.companies.find(c=>c.name===n)){render();return;}
  const comp=state.companies.find(c=>c.name===old);
  if(comp)comp.name=n;
  state.contacts.forEach(c=>{if(c.bedrijf===old)c.bedrijf=n;});
  state.companyDetail=n;
  saveCompanies();save();render();
}

window.deleteCompany=(name)=>{
  if(!confirm(`Bedrijf "${name}" verwijderen? Contactpersonen worden losgekoppeld.`))return;
  state.companies=state.companies.filter(c=>c.name!==name);
  state.contacts.forEach(c=>{if(c.bedrijf===name)c.bedrijf='';});
  state.companyDetail=null;
  saveCompanies();save();render();
}

window.toggleCompanyType=(name,type,checked)=>{
  let comp=state.companies.find(c=>c.name===name);
  if(!comp){comp={name,types:[],sectoren:[],notities:''};state.companies.push(comp);}
  comp.types=comp.types||[];
  if(checked){if(!comp.types.includes(type))comp.types.push(type);}
  else{comp.types=comp.types.filter(t=>t!==type);}
  saveCompanies();
}

window.toggleCompanySector=(name,sector,checked)=>{
  let comp=state.companies.find(c=>c.name===name);
  if(!comp){comp={name,types:[],sectoren:[],notities:''};state.companies.push(comp);}
  comp.sectoren=comp.sectoren||[];
  if(checked){if(!comp.sectoren.includes(sector))comp.sectoren.push(sector);}
  else{comp.sectoren=comp.sectoren.filter(s=>s!==sector);}
  saveCompanies();
}

window.updateCompanyField=(name,k,v)=>{
  let comp=state.companies.find(c=>c.name===name);
  if(!comp){comp={name,types:[],sectoren:[],notities:''};state.companies.push(comp);}
  comp[k]=(v||'').trim();
  saveCompanies();
}

window.linkContact=(compName)=>{
  const sel=document.getElementById('link-contact-select');
  const id=parseInt(sel?.value);
  if(!id)return;
  const c=state.contacts.find(x=>x.id===id);
  if(!c)return;
  c.bedrijf=compName;
  ensureCompany(compName);
  save();render();
}

window.unlinkContact=(id,compName)=>{
  const c=state.contacts.find(x=>x.id===id);
  if(!c)return;
  if(!confirm(`${fullName(c)} loskoppelen van ${compName}?`))return;
  c.bedrijf='';
  save();render();
}



// Login
const PWD='SterreBoer';
const RECOVERY='RRH-2026-CRM';
const SESSION_KEY='crm_session';

function checkLogin(){
  return sessionStorage.getItem(SESSION_KEY)==='1';
}

function showLogin(){
  document.getElementById('root').style.display='none';
  const el=document.createElement('div');
  el.className='login-screen';
  el.id='login-screen';
  el.innerHTML=`
    <div class="login-box">
      <div class="login-title">Huntlijst CRM</div>
      <div class="login-sub">Voer je wachtwoord in om door te gaan</div>
      <div class="login-label">Wachtwoord</div>
      <input class="login-input" type="password" id="pwd-input" placeholder="Wachtwoord..." onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">Inloggen</button>
      <div class="login-error" id="login-error"></div>
      <div class="login-hint" onclick="toggleHint()">Wachtwoord vergeten?</div>
      <div class="login-hint-text" id="hint-text">Hint: <strong>Oudste dochter</strong><br>Of gebruik herstelcode <strong>RRH-2026-CRM</strong></div>
    </div>`;
  document.body.appendChild(el);
  document.getElementById('pwd-input').focus();
}

function toggleHint(){
  const el=document.getElementById('hint-text');
  el.style.display=el.style.display==='block'?'none':'block';
}

function doLogin(){
  const val=document.getElementById('pwd-input').value;
  if(val===PWD||val===RECOVERY){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.getElementById('login-screen').remove();
    document.getElementById('root').style.display='';
    load();
  } else {
    document.getElementById('login-error').textContent='Onjuist wachtwoord, probeer opnieuw.';
    document.getElementById('pwd-input').value='';
    document.getElementById('pwd-input').focus();
  }
}

if(checkLogin()){load();}else{showLogin();}

let bedrijfSelectedIdx=-1;

window.showBedrijfSuggestions=(val)=>{
  const list=document.getElementById('bedrijf-suggestions');
  if(!list)return;
  const q=(val||'').toLowerCase().trim();
  const allBedrijven=[...new Set(state.contacts.map(c=>c.bedrijf).filter(Boolean))].sort();
  const matches=q?allBedrijven.filter(b=>b.toLowerCase().includes(q)):allBedrijven;
  if(!matches.length&&!q){list.style.display='none';return;}
  const showNew=q&&!allBedrijven.find(b=>b.toLowerCase()===q);
  let html=matches.slice(0,10).map((b,i)=>`<div class="autocomplete-item" data-val="${b.replace(/"/g,'&quot;')}" onmousedown="selectBedrijf('${b.replace(/'/g,"\'")}')">${b}</div>`).join('');
  if(showNew)html+=`<div class="autocomplete-item new-item" onmousedown="selectBedrijf('${val.replace(/'/g,"\'")}')">+ Nieuw bedrijf: "${val}"</div>`;
  list.innerHTML=html;
  list.style.display=matches.length||showNew?'block':'none';
  bedrijfSelectedIdx=-1;
}

window.hideBedrijfSuggestions=()=>{
  const list=document.getElementById('bedrijf-suggestions');
  if(list)list.style.display='none';
  bedrijfSelectedIdx=-1;
}

window.selectBedrijf=(val)=>{
  state.newContact.bedrijf=val;
  const input=document.getElementById('bedrijf-input');
  if(input)input.value=val;
  hideBedrijfSuggestions();
}

window.handleBedrijfKey=(e)=>{
  const list=document.getElementById('bedrijf-suggestions');
  if(!list||list.style.display==='none')return;
  const items=list.querySelectorAll('.autocomplete-item');
  if(e.key==='ArrowDown'){e.preventDefault();bedrijfSelectedIdx=Math.min(bedrijfSelectedIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();bedrijfSelectedIdx=Math.max(bedrijfSelectedIdx-1,0);}
  else if(e.key==='Enter'&&bedrijfSelectedIdx>=0){e.preventDefault();selectBedrijf(items[bedrijfSelectedIdx].dataset.val);return;}
  else if(e.key==='Escape'){hideBedrijfSuggestions();return;}
  items.forEach((item,i)=>{item.classList.toggle('selected',i===bedrijfSelectedIdx);});
}

</script>
